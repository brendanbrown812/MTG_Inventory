services:
  backend:
    build:
      context: ./backend
    environment:
      # Absolute path inside the container; matched to the db_data volume below
      DATABASE_URL: sqlite:////data/mtg_inventory.db
      # Set this to the URL(s) you use to access Spellbinder (comma-separated, no trailing slash).
      # Include your Cloudflare Tunnel domain when you have one, e.g.:
      #   CORS_ORIGINS=https://spellbinder.yourdomain.com
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8888}
    volumes:
      - db_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    ports:
      - "${PORT:-8888}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
    name: spellbinder_db_data
